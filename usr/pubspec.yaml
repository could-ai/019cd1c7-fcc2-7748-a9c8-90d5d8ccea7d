name: couldai_user_app
description: "True Holder - Family Office Management Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2  # For state management
  intl: ^0.19.0  # For date formatting
  fl_chart: ^0.68.0  # For charts (adapting from recharts)
  uuid: ^4.4.0  # For generating IDs in mock data

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/Inter-Regular.ttf
        - asset: fonts/Inter-Bold.ttf
          weight: 700